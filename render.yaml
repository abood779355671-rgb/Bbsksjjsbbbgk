services:
  - type: web
    name: ocr-translate-bot
    env: python
    buildCommand: |
      apt-get install -y poppler-utils libgl1 libglib2.0-0 && pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
